# Shared engine registry (Python control plane; Companion mirrors download URLs).
engines:
  kokoro:
    name: Kokoro
    optional_dependency: null
    openai_model_aliases: [tts-1, tts-1-hd]
    assets:
      - filename: kokoro-v1.0.onnx
        url: https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/kokoro-v1.0.onnx
      - filename: voices-v1.0.bin
        url: https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/voices-v1.0.bin
      - filename: kokoro-v1.1-zh.onnx
        url: https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.1/kokoro-v1.1-zh.onnx
      - filename: voices-v1.1-zh.bin
        url: https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.1/voices-v1.1-zh.bin
      - filename: kokoro-v1.1-zh-config.json
        url: https://huggingface.co/hexgrad/Kokoro-82M-v1.1-zh/raw/main/config.json

  qwen3-tts:
    name: Qwen3-TTS
    optional_dependency: qwen
    openai_model_aliases: [qwen3-tts, qwen-tts]
    huggingface_repo: Qwen/Qwen3-TTS-12Hz-0.6B-CustomVoice
    model_subdir: qwen3-tts
    readiness_files:
      - config.json
