name: Companion Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    env:
      UV_MANAGED_PYTHON: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Pin uv-managed Python
        run: |
          uv python install 3.12
          PYTHON_BIN="$(uv python find 3.12 --no-project --managed-python --resolve-links)"
          echo "Using managed Python: $PYTHON_BIN"
          otool -L "$PYTHON_BIN" | head -5
          if otool -L "$PYTHON_BIN" | grep -q '/Library/Frameworks/Python.framework/'; then
            echo "error: managed Python still links to python.org framework" >&2
            exit 1
          fi

      - name: Build and package Sonus.app
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd SonusCompanion
          chmod +x build_app.sh
          ./build_app.sh release "$VERSION"

      - name: Verify release zip
        run: |
          test -f SonusCompanion/build/Sonus-macos.zip
          unzip -l SonusCompanion/build/Sonus-macos.zip | grep -F 'Sonus.app/Contents/MacOS/Sonus'
          unzip -l SonusCompanion/build/Sonus-macos.zip | grep -F 'Sonus.app/Contents/Resources/sonus-runtime/bin/python3'
          unzip -p SonusCompanion/build/Sonus-macos.zip 'Sonus.app/Contents/Resources/sonus-runtime/python/bin/python3.12' > /tmp/embedded-python3.12
          chmod +x /tmp/embedded-python3.12
          ! otool -L /tmp/embedded-python3.12 | grep -q '/Library/Frameworks/Python.framework/'

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: SonusCompanion/build/Sonus-macos.zip
          generate_release_notes: true
          append_body: true
          body: |
            ## Install (macOS)

            1. Download **`Sonus-macos.zip`**
            2. Unzip and drag **`Sonus.app`** to **`/Applications`**
            3. Open **Sonus** — if Gatekeeper blocks it, use **System Settings → Privacy & Security → Open Anyway**
            4. Grant **Accessibility** for selected-text capture
            5. On first launch, allow **model download** in Settings → Backend (or point to an existing `models/` directory in Advanced)

            This release includes an **embedded TTS backend** — no separate `sonus serve` or Docker required for the menu bar app. External agents can still use `http://127.0.0.1:8000` while Sonus is running.

            Developer / server setup: [README](https://github.com/XinchaoGou/Sonus#quick-start).
